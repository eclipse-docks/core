<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" width="220" height="100" aria-label="Lyra logo">
  <!-- Icon: Lyra constellation; white stroke for visibility on dark and light -->
  <!-- White outline layer (drawn first) -->
  <g transform="translate(12, 0)" stroke="#fff" stroke-width="4.25" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 50 25 L 47.2 36.3"/>
    <path d="M 50 36 L 30 48 L 50 65 L 70 48 Z" transform="rotate(-12, 50, 49.25)"/>
  </g>
  <g transform="translate(12, 0)" fill="none" stroke="#fff" stroke-width="1.4">
    <circle cx="50" cy="25" r="4.5" aria-hidden="true"/>
    <circle cx="50" cy="36" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
    <circle cx="30" cy="48" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
    <circle cx="50" cy="65" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
    <circle cx="70" cy="48" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
  </g>
  <!-- Black layer on top -->
  <g transform="translate(12, 0)" stroke="#1a1a1a" stroke-width="2.25" stroke-linecap="round" fill="none">
    <path d="M 50 25 L 47.2 36.3"/>
    <path d="M 50 36 L 30 48 L 50 65 L 70 48 Z" transform="rotate(-12, 50, 49.25)"/>
  </g>
  <g transform="translate(12, 0)" fill="#1a1a1a">
    <circle cx="50" cy="25" r="4.5" aria-hidden="true"/>
    <circle cx="50" cy="36" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
    <circle cx="30" cy="48" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
    <circle cx="50" cy="65" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
    <circle cx="70" cy="48" r="2.75" aria-hidden="true" transform="rotate(-12, 50, 49.25)"/>
  </g>
  <!-- Wordmark: white stroke then fill for both modes -->
  <text x="100" y="60" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="500" fill="#1a1a1a" stroke="#fff" stroke-width="1.2" paint-order="stroke fill" letter-spacing="0.03em">Lyra</text>
</svg>
